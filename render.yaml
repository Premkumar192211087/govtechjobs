services:
  # 1. AI/ML Python FastAPI Service
  - type: web
    name: govtechjobs-ai
    runtime: python
    plan: free
    rootDir: AIML model
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHONIOENCODING
        value: utf-8

  # 2. Node.js Express Frontend Web Server
  - type: web
    name: govtechjobs
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SCRAPE_INTERVAL_HOURS
        value: 6
      - key: AI_SERVICE_URL
        fromService:
          name: govtechjobs-ai
          type: web
          property: host
